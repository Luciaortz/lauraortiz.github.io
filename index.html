<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gráfica Festivos Colombia</title>

    <!-- Plotly -->
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

    <style>
        body {
            margin: 0;
            font-family: 'times New Roman', Times, serif;
            background: linear-gradient(135deg, #122783, #1c3faa);
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 700px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        h1 {
            margin-bottom: 10px;
            color: #122783;
        }

        p {
            color: #666;
            margin-bottom: 20px;
        }

        #grafica {
            width: 100%;
            height: 400px;
        }

        .footer {
            margin-top: 15px;
            font-size: 12px;
            color: #aaa;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Festivos de Colombia </h1>
    <p>Cantidad de festivos por mes (2025)</p>

    <div id="grafica"></div>

    <div class="footer">Proyecto API - Visualización con Plotly</div>
</div>

<script>
    const festivos = [
        { "date": "2025-01-01T00:00:00", "name": "Año Nuevo" },
        { "date": "2025-01-06T00:00:00", "name": "Día de los Reyes Magos" },
        { "date": "2025-03-24T00:00:00", "name": "Día de San José" },
        { "date": "2025-04-17T00:00:00", "name": "Jueves Santo" },
        { "date": "2025-04-18T00:00:00", "name": "Viernes Santo" },
        { "date": "2025-05-01T00:00:00", "name": "Día del Trabajo" },
        { "date": "2025-06-02T00:00:00", "name": "Día de la Ascensión" },
        { "date": "2025-06-23T00:00:00", "name": "Día de Corpus Christi" },
        { "date": "2025-06-30T00:00:00", "name": "Día del Sagrado Corazón de Jesús" },
        { "date": "2025-06-30T00:00:00", "name": "Día de San Pedro y San Pablo" },
        { "date": "2025-07-20T00:00:00", "name": "Día de la Independencia" },
        { "date": "2025-08-07T00:00:00", "name": "Batalla de Boyacá" },
        { "date": "2025-08-18T00:00:00", "name": "Asunción de la Virgen" },
        { "date": "2025-10-13T00:00:00", "name": "Día de la Raza" },
        { "date": "2025-11-03T00:00:00", "name": "Día de todos los Santos" },
        { "date": "2025-11-17T00:00:00", "name": "Independencia de Cartagena" },
        { "date": "2025-12-08T00:00:00", "name": "Inmaculada Concepción" },
        { "date": "2025-12-25T00:00:00", "name": "Navidad" }
    ];

    const meses = Array(12).fill(0);

    festivos.forEach(f => {
        const mes = new Date(f.date).getMonth();
        meses[mes]++;
    });

    const nombresMeses = [
        "Ene","Feb","Mar","Abr","May","Jun",
        "Jul","Ago","Sep","Oct","Nov","Dic"
    ];

    const trace = {
        x: nombresMeses,
        y: meses,
        type: 'bar'
    };

    const layout = {
        title: "Festivos por mes",
        paper_bgcolor: "transparent",
        plot_bgcolor: "transparent"
    };

    Plotly.newPlot("grafica", [trace], layout);
</script>

</body>
</html>
