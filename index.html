<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gráfica Festivos Colombia</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        body {
            margin: 0;
            font-family: 'Times New Roman', Times, serif;
            background: linear-gradient(135deg, #f9c6d0, #edccd3);
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 700px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            text-align: center;
        }
        h1 {
            margin-bottom: 10px;
            color: #c2185b;
            font-family: 'Times New Roman', Times, serif;
        }
        p {
            color: #888;
            margin-bottom: 20px;
            font-family: 'Times New Roman', Times, serif;
        }
        #grafica {
            width: 100%;
            height: 400px;
        }
        .footer {
            margin-top: 15px;
            font-size: 12px;
            color: #bbb;
            font-family: 'Times New Roman', Times, serif;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Dias festivos de Colombia</h1>
    <p>Cantidad de festivos por mes (2025)</p>
    <div id="grafica"></div>
    <div class="footer">Proyecto API - Laura Lucia Ortiz De La rosa</div>
</div>
<script>
    const festivos = [
        { "date": "2025-01-01T00:00:00", "name": "Año Nuevo" },
        { "date": "2025-01-06T00:00:00", "name": "Día de los Reyes Magos" },
        { "date": "2025-03-24T00:00:00", "name": "Día de San José" },
        { "date": "2025-04-17T00:00:00", "name": "Jueves Santo" },
        { "date": "2025-04-18T00:00:00", "name": "Viernes Santo" },
        { "date": "2025-05-01T00:00:00", "name": "Día del Trabajo" },
        { "date": "2025-06-02T00:00:00", "name": "Día de la Ascensión" },
        { "date": "2025-06-23T00:00:00", "name": "Día de Corpus Christi" },
        { "date": "2025-06-30T00:00:00", "name": "Día del Sagrado Corazón de Jesús" },
        { "date": "2025-06-30T00:00:00", "name": "Día de San Pedro y San Pablo" },
        { "date": "2025-07-20T00:00:00", "name": "Día de la Independencia" },
        { "date": "2025-08-07T00:00:00", "name": "Batalla de Boyacá" },
        { "date": "2025-08-18T00:00:00", "name": "Asunción de la Virgen" },
        { "date": "2025-10-13T00:00:00", "name": "Día de la Raza" },
        { "date": "2025-11-03T00:00:00", "name": "Día de todos los Santos" },
        { "date": "2025-11-17T00:00:00", "name": "Independencia de Cartagena" },
        { "date": "2025-12-08T00:00:00", "name": "Inmaculada Concepción" },
        { "date": "2025-12-25T00:00:00", "name": "Navidad" }
    ];

    const meses = Array(12).fill(0);
    festivos.forEach(f => {
        const mes = new Date(f.date).getMonth();
        meses[mes]++;
    });

    const nombresMeses = [
        "Ene","Feb","Mar","Abr","May","Jun",
        "Jul","Ago","Sep","Oct","Nov","Dic"
    ];

    const colores = [
        "#f48fb1","#f06292","#e91e63","#f48fb1",
        "#ce93d8","#ba68c8","#ab47bc","#9c27b0",
        "#f06292","#e57373","#ef9a9a","#f48fb1"
    ];

    const trace = {
        x: nombresMeses,
        y: meses,
        type: 'bar',
        marker: { color: colores },
        text: meses.map(v => v > 0 ? v : ''),
        textposition: 'outside',
        textfont: { family: 'Times New Roman', size: 13, color: '#555' },
        hovertemplate: '<b>%{x}</b><br>Festivos: %{y}<extra></extra>'
    };

    const layout = {
        title: {
            text: "Festivos por mes",
            font: { family: 'Times New Roman', size: 16, color: '#c2185b' }
        },
        paper_bgcolor: "transparent",
        plot_bgcolor: "transparent",
        font: { family: 'Times New Roman' },
        xaxis: {
            tickfont: { family: 'Times New Roman', size: 13, color: '#555' },
            gridcolor: 'transparent',
            zeroline: false,
            showline: false
        },
        yaxis: {
            tickfont: { family: 'Times New Roman', size: 12, color: '#bbb' },
            gridcolor: '#f5e6ea',
            zeroline: false,
            showline: false,
            dtick: 1
        },
        margin: { t: 40, b: 30, l: 30, r: 10 },
        bargap: 0.3,
        hoverlabel: {
            bgcolor: '#c2185b',
            bordercolor: '#c2185b',
            font: { family: 'Times New Roman', color: '#fff', size: 13 }
        }
    };

    Plotly.newPlot("grafica", [trace], layout, { responsive: true, displayModeBar: false });
</script>
</body>
</html>
